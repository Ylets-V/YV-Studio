<script>
const audio = document.getElementById('audioSource');
const canvas = document.getElementById('visualizer');
const ctx = canvas.getContext('2d');

let audioCtx, analyser, dataArray;
let isExporting = false;

// 🎯 DRAW CORREGIDO (FIX PRINCIPAL)
function draw() {
    requestAnimationFrame(draw);

    if(analyser) analyser.getByteFrequencyData(dataArray);

    // ❌ YA NO se cambia tamaño dinámicamente
    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    const waveColor = document.getElementById('cWaves').value || "#10b981";
    const time = Date.now() * 0.003;

    let bass = 0; 
    if(dataArray && !audio.paused) { 
        for(let i=0; i<5; i++) bass += dataArray[i]; 
        bass = (bass/5)/255; 
    }

    const drawWave = (amp, freq, speed, op, thick) => {
        ctx.beginPath(); 
        ctx.lineWidth = thick; 
        ctx.strokeStyle = waveColor + op;

        for(let x=0; x<=w; x+=4) {
            const y = (h/2) + Math.sin(x*freq + time*speed) * amp;
            if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
    };

    drawWave(30+(bass*60), 0.004, 0.5, "33", 10);
    drawWave(20+(bass*80), 0.008, 1.2, "88", 6);
    drawWave(10+(bass*30), 0.015, 2.0, "FF", 3);
}

window.onload = () => {
    // 🔥 tamaño inicial fijo (IMPORTANTE)
    canvas.width = canvas.clientWidth * 2;
    canvas.height = canvas.clientHeight * 2;

    draw();
};

// 🚀 EXPORT CORREGIDO
async function exportMp4() {
    if(isExporting) return;

    const btn = document.getElementById('btnMp4');
    const status = document.getElementById('exportStatus');

    if (!audio.src) {
        status.innerText = "Carga un audio primero";
        status.classList.add('active');
        return;
    }

    try {
        isExporting = true;
        btn.disabled = true;
        status.innerText = "Grabando video...";
        status.classList.add('active');

        // 🔥 FIJAR resolución SOLO UNA VEZ
        canvas.width = canvas.clientWidth * 2;
        canvas.height = canvas.clientHeight * 2;

        if(!audioCtx){
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();

            const source = audioCtx.createMediaElementSource(audio);
            const dest = audioCtx.createMediaStreamDestination();

            source.connect(analyser);
            analyser.connect(dest);
            analyser.connect(audioCtx.destination);

            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            window.recordDest = dest;
        }

        await audioCtx.resume();

        const stream = canvas.captureStream(30);

        const combined = new MediaStream([
            ...stream.getVideoTracks(),
            ...window.recordDest.stream.getAudioTracks()
        ]);

        const recorder = new MediaRecorder(combined, {
            mimeType: "video/webm;codecs=vp8"
        });

        const chunks = [];

        recorder.ondataavailable = e => {
            if(e.data.size > 0) chunks.push(e.data);
        };

        recorder.onerror = e => {
            console.error(e);
            status.innerText = "Error de grabación";
        };

        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: "video/webm" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "YV_STUDIO_EXPORT.webm";
            a.click();

            status.innerText = "Exportación completa";
            setTimeout(()=>status.classList.remove('active'),2000);

            isExporting = false;
            btn.disabled = false;
        };

        audio.currentTime = 0;
        await audio.play();
        recorder.start();

        audio.onended = () => {
            recorder.stop();
            audio.pause();
        };

    } catch (err) {
        console.error(err);
        status.innerText = "Error en el proceso";
        isExporting = false;
        btn.disabled = false;
    }
}
</script>
