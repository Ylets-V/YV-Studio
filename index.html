<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YV-STUDIO ULTIMATE v4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@300;400;600&family=Bebas+Neue&family=Montserrat:wght@900&family=Playfair+Display:ital,wght@1,900&family=Space+Grotesk:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-blur: 15px;
            --bg-blur: 8px;
            --bg-brightness: 0.3;
            --border-radius: 20px;
            --color-waves: #10b981;
            --color-player: #ffffff;
            --pin-width: 380px;
            --pin-height: 675px;
            --pin-brightness: 1;
            --pin-contrast: 1;
            --pin-saturate: 1;
            --pin-scale: 1;
            --wave-scale: 1;
            --font-title: 'Syne', sans-serif;
            --font-artist: 'Outfit', sans-serif;
            --theme-bg: #000;
            --panel-bg-left: rgba(0, 0, 0, 0.7);
            --panel-bg-right: rgba(0, 0, 0, 0.7);
            --player-scale: 1;
            --player-internal-zoom: 1;
            --export-padding: 0px;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--theme-bg);
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        .web-bg {
            position: fixed;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(var(--bg-brightness)) blur(var(--bg-blur));
            transition: 0.5s ease;
        }

        .web-color-overlay {
            position: fixed;
            inset: 0;
            background: var(--theme-bg);
            z-index: -2;
            transition: background 0.5s ease;
        }

        .sidebar {
            position: fixed;
            top: 20px;
            bottom: 20px;
            width: 360px;
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            padding: 24px;
            z-index: 1000;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 0px; }

        #toolPanel { 
            left: 20px; 
            transform: translateX(calc(-100% - 40px)); 
            background: var(--panel-bg-left);
        }
        #toolPanel.active { transform: translateX(0); }
        
        #stylePanel { 
            right: 20px; 
            transform: translateX(calc(100% + 40px)); 
            background: var(--panel-bg-right);
        }
        #stylePanel.active { transform: translateX(0); }

        .edge-trigger { position: fixed; top: 0; bottom: 0; width: 40px; z-index: 999; cursor: pointer; }
        .trigger-left { left: 0; }
        .trigger-right { right: 0; }

        .viewport { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }

        #scaleWrapper { transform: scale(var(--pin-scale)); transition: transform 0.2s ease; }

        .pin-wrapper {
            position: relative;
            width: var(--pin-width);
            height: var(--pin-height);
            background-image: url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?auto=format&fit=crop&q=80&w=800');
            background-size: cover;
            background-position: center;
            border-radius: var(--border-radius);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            filter: brightness(var(--pin-brightness)) contrast(var(--pin-contrast)) saturate(var(--pin-saturate));
        }

        .glass-overlay {
            position: absolute;
            inset: calc(15px + var(--export-padding)); 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: calc(var(--border-radius) - 5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
            z-index: 2;
            transition: inset 0.2s ease;
        }

        #internalZoomContainer {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transform: scale(var(--player-internal-zoom));
            transition: transform 0.2s ease;
        }

        #playerContainer {
            transition: transform 0.1s ease-out;
            transform: scale(var(--player-scale));
        }

        .input-group label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.7); margin-bottom: 6px; display: block; font-weight: 700; }
        .field { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 10px 14px; border-radius: 12px; color: white; font-size: 13px; width: 100%; outline: none; transition: 0.2s; }
        .field:focus { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
        
        .btn-glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; font-size: 10px; font-weight: 600; cursor: pointer; color: white; transition: 0.2s; text-align: center; width: 100%; }
        .btn-glass:hover { background: rgba(255,255,255,0.1); }
        .btn-primary { background: #fff; color: #000; border: none; font-weight: 800; }

        .swatch-circle { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); transition: 0.3s; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .swatch-circle.active { border-color: white; transform: scale(1.1); }
        .swatch-picker { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        @keyframes rainbow-rotate {
            from { filter: hue-rotate(0deg); }
            to { filter: hue-rotate(360deg); }
        }
        #customSwatch {
            background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
            animation: rainbow-rotate 3s linear infinite;
        }

        .toggle-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); height: 40px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); }
        .toggle-btn.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); color: white; }

        .seek-bar { width: 100%; height: 2px; background: rgba(255,255,255,0.1); appearance: none; outline: none; background-image: linear-gradient(var(--color-player), var(--color-player)); background-size: 0% 100%; background-repeat: no-repeat; cursor: pointer; }
        .seek-bar::-webkit-slider-thumb { appearance: none; width: 8px; height: 8px; background: var(--color-player); border-radius: 50%; }

        input[type="color"] { -webkit-appearance: none; border: none; width: 100%; height: 25px; cursor: pointer; background: none; padding: 0; }
        input[type="color"]::-webkit-color-swatch { border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="web-color-overlay"></div>
    <div class="web-bg" id="webBackground"></div>

    <div class="edge-trigger trigger-left" onmouseenter="openSidebar('toolPanel')"></div>
    <div class="edge-trigger trigger-right" onmouseenter="openSidebar('stylePanel')"></div>

    <!-- PANEL IZQUIERDO: HERRAMIENTAS -->
    <aside class="sidebar" id="toolPanel">
        <div class="mb-4 text-center">
            <h1 class="text-3xl font-black italic tracking-tighter">YV-STUDIO</h1>
            <p class="text-[10px] opacity-50 uppercase tracking-widest">Ultimate Editor v4.1</p>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button class="btn-glass" onclick="document.getElementById('fAudio').click()">CARGAR AUDIO</button>
            <button class="btn-glass" onclick="document.getElementById('fPin').click()">CARGAR PORTADA</button>
            <input type="file" id="fAudio" class="hidden" accept="audio/*" onchange="handleFile(event, 'audio')">
            <input type="file" id="fPin" class="hidden" accept="image/*" onchange="handleFile(event, 'pin')">
        </div>

        <div class="input-group">
            <label>Textos & Fuentes</label>
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-2">
                    <span class="text-[8px] opacity-40 font-bold uppercase">TÍTULO</span>
                    <input type="text" id="inTitle" class="field" value="Track Title" oninput="updateUI()">
                    <span class="text-[8px] opacity-40 font-bold uppercase">FUENTE TÍTULO</span>
                    <input type="text" id="manualFontT" class="field !text-[10px]" placeholder="Ej: Syne" oninput="updateUI()">
                </div>
                <div class="space-y-2">
                    <span class="text-[8px] opacity-40 font-bold uppercase">ARTISTA</span>
                    <input type="text" id="inArtist" class="field" value="Artist Name" oninput="updateUI()">
                    <span class="text-[8px] opacity-40 font-bold uppercase">FUENTE ARTISTA</span>
                    <input type="text" id="manualFontA" class="field !text-[10px]" placeholder="Ej: Outfit" oninput="updateUI()">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-3">
                <div><span class="text-[8px] opacity-40 font-bold uppercase">TAMAÑO TÍT</span><input type="number" id="tsTitle" class="field" value="48" oninput="updateUI()"></div>
                <div><span class="text-[8px] opacity-40 font-bold uppercase">TAMAÑO ART</span><input type="number" id="tsArtist" class="field" value="10" oninput="updateUI()"></div>
            </div>
            <div class="mt-3">
                <button class="btn-glass !py-2 !text-[8px]" onclick="document.getElementById('fileFontCustom').click()">SUBIR ARCHIVO .OTF / .TTF</button>
                <input type="file" id="fileFontCustom" class="hidden" accept=".otf,.ttf" onchange="handleCustomFontFile(event)">
            </div>
        </div>

        <div class="input-group">
            <label>Forma & Estructura</label>
            <div class="space-y-3">
                <div>
                    <span class="text-[8px] opacity-40 font-bold uppercase">REDONDEAR ESQUINAS</span>
                    <input type="range" id="inRadius" min="0" max="100" value="20" oninput="updateDimensions()" class="w-full accent-white">
                </div>
                <div>
                    <span class="text-[8px] opacity-40 font-bold uppercase">ZOOM PLAYER (AGRANDAR)</span>
                    <input type="range" id="inPlayerZoom" min="0.5" max="2" step="0.05" value="1" oninput="updateDimensions()" class="w-full accent-white">
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>Dimensiones Canvas & Zoom Vista</label>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <input type="number" id="inWidth" class="field" value="380" oninput="updateDimensions()">
                <input type="number" id="inHeight" class="field" value="675" oninput="updateDimensions()">
            </div>
            <input type="range" id="uiScale" min="0.3" max="1.5" step="0.05" value="1" oninput="updateDimensions()" class="w-full accent-white">
        </div>
    </aside>

    <!-- PANEL DERECHO: ESTILOS -->
    <aside class="sidebar" id="stylePanel">
        <div class="mb-4 text-center">
            <h1 class="text-3xl font-black italic tracking-tighter">ESTILOS</h1>
        </div>

        <div class="input-group">
            <label>Visibilidad (Elementos)</label>
            <div class="grid grid-cols-4 gap-2">
                <div id="btn-outTitle" class="toggle-btn active" onclick="toggleVisibility('outTitle')">TIT</div>
                <div id="btn-outArtist" class="toggle-btn active" onclick="toggleVisibility('outArtist')">ART</div>
                <div id="btn-visualizer" class="toggle-btn active" onclick="toggleVisibility('visualizer')">WAV</div>
                <div id="btn-playerContainer" class="toggle-btn active" onclick="toggleVisibility('playerContainer')">PLY</div>
            </div>
        </div>

        <div class="input-group">
            <label>Escalado Onda</label>
            <input type="range" id="waveScale" min="0.2" max="5" step="0.1" value="1" oninput="updateUI()" class="w-full accent-white">
        </div>

        <div class="input-group">
            <label>Colores Individuales</label>
            <div class="grid grid-cols-4 gap-3">
                <input type="color" id="cTitle" value="#ffffff" oninput="updateUI()">
                <input type="color" id="cArtist" value="#ffffff" oninput="updateUI()">
                <input type="color" id="cWaves" value="#10b981" oninput="updateUI()">
                <input type="color" id="cPlayer" value="#ffffff" oninput="updateUI()">
            </div>
        </div>

        <div class="input-group">
            <label>Fondo Web & Opacidad Paneles</label>
            <div class="flex justify-between mb-4">
                <div class="swatch-circle bg-black active" onclick="applyTheme('dark', this)"></div>
                <div class="swatch-circle bg-white" onclick="applyTheme('light', this)"></div>
                <div class="swatch-circle bg-emerald-600" onclick="applyTheme('green', this)"></div>
                <div class="swatch-circle" id="customSwatch">
                    <input type="color" class="swatch-picker" id="customBgColor" oninput="applyCustomColor(this.value)">
                </div>
            </div>
            <div class="space-y-3">
                <button class="btn-glass !py-2 !text-[10px]" onclick="document.getElementById('fWeb').click()">CARGAR IMAGEN WEB</button>
                <input type="file" id="fWeb" class="hidden" accept="image/*" onchange="handleFile(event, 'web')">
                
                <div class="grid grid-cols-2 gap-3">
                    <div><span class="text-[8px] opacity-40 font-bold uppercase">BRILLO</span><input type="range" id="bgBrightness" min="0" max="1" step="0.05" value="0.3" oninput="updateWebAdjustments()" class="w-full accent-white"></div>
                    <div><span class="text-[8px] opacity-40 font-bold uppercase">DESENFOQUE</span><input type="range" id="bgBlur" min="0" max="50" value="8" oninput="updateWebAdjustments()" class="w-full accent-white"></div>
                </div>
                <hr class="opacity-10 my-1">
                <div class="grid grid-cols-2 gap-3">
                    <div><span class="text-[8px] opacity-40 font-bold uppercase">OPACIDAD IZQ</span><input type="range" id="opLeft" min="0" max="1" step="0.05" value="0.7" oninput="updatePanelOpacity()" class="w-full accent-white"></div>
                    <div><span class="text-[8px] opacity-40 font-bold uppercase">OPACIDAD DER</span><input type="range" id="opRight" min="0" max="1" step="0.05" value="0.7" oninput="updatePanelOpacity()" class="w-full accent-white"></div>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>Cristalizado (Blur Pin)</label>
            <input type="range" id="inBlurPx" min="0" max="60" value="15" oninput="updateUI()" class="w-full accent-white">
        </div>

        <div class="mt-auto">
            <button class="btn-glass btn-primary py-4 text-[11px]" onclick="downloadPinImage()">GUARDAR DISEÑO (PNG)</button>
        </div>
    </aside>

    <main class="viewport" id="mainViewport" onclick="closeSidebar()">
        <div id="scaleWrapper">
            <div class="pin-wrapper" id="pinFrame">
                <div class="glass-overlay" id="glassLayer">
                    <div id="internalZoomContainer">
                        <div class="text-center w-full px-4">
                            <h2 id="outTitle" class="font-black uppercase tracking-tighter leading-tight mb-3">Track Title</h2>
                            <p id="outArtist" class="tracking-[5px] uppercase opacity-70">Artist Name</p>
                        </div>

                        <canvas id="visualizer" class="w-full h-32"></canvas>

                        <div id="playerContainer" class="w-full px-6">
                            <input type="range" id="seekBar" class="seek-bar" value="0" step="0.1" oninput="seek(this.value)">
                            <div class="flex justify-between w-full mt-2 text-[9px] font-bold opacity-50">
                                <span id="curTime">00:00</span>
                                <span id="durTime">00:00</span>
                            </div>
                            <div class="flex justify-center mt-6">
                                <button onclick="togglePlay(event)" id="playBtn" class="w-14 h-14 rounded-full border border-white/20 flex items-center justify-center hover:bg-white/10 transition-all">
                                    <svg id="playIcon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                        <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.333-5.89a1.5 1.5 0 000-2.538L6.3 2.841z"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <audio id="audioSource" crossorigin="anonymous"></audio>

    <!-- Librerías Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        const audio = document.getElementById('audioSource');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        let audioCtx, analyser, dataArray;

        // Sidebar logic
        function openSidebar(id) { 
            closeSidebar();
            document.getElementById(id).classList.add('active'); 
        }
        function closeSidebar() { 
            document.querySelectorAll('.sidebar').forEach(s => s.classList.remove('active'));
        }

        // Feature Toggles
        function toggleVisibility(id) {
            const el = document.getElementById(id);
            const btn = document.getElementById('btn-' + id);
            const isHidden = el.style.display === 'none';
            el.style.display = isHidden ? '' : 'none';
            btn.classList.toggle('active', !isHidden);
        }

        // Appearance
        function applyTheme(theme, btn) {
            document.querySelectorAll('.swatch-circle').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const root = document.documentElement;
            const themes = {
                dark: { bg: '#000', op: 0.7 },
                light: { bg: '#f1f5f9', op: 0.4 },
                green: { bg: '#064e3b', op: 0.6 }
            };
            root.style.setProperty('--theme-bg', themes[theme].bg);
            document.getElementById('opLeft').value = themes[theme].op;
            document.getElementById('opRight').value = themes[theme].op;
            updatePanelOpacity();
        }

        function applyCustomColor(color) {
            document.querySelectorAll('.swatch-circle').forEach(b => b.classList.remove('active'));
            document.getElementById('customSwatch').classList.add('active');
            document.documentElement.style.setProperty('--theme-bg', color);
        }

        function updatePanelOpacity() {
            const opL = document.getElementById('opLeft').value;
            const opR = document.getElementById('opRight').value;
            document.documentElement.style.setProperty('--panel-bg-left', `rgba(0, 0, 0, ${opL})`);
            document.documentElement.style.setProperty('--panel-bg-right', `rgba(0, 0, 0, ${opR})`);
        }

        function handleCustomFontFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const fontName = 'UserFont_' + Date.now();
                const fontFace = new FontFace(fontName, event.target.result);
                fontFace.load().then(loadedFace => {
                    document.fonts.add(loadedFace);
                    document.getElementById('manualFontT').value = fontName;
                    updateUI();
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function updateWebAdjustments() {
            document.documentElement.style.setProperty('--bg-brightness', document.getElementById('bgBrightness').value);
            document.documentElement.style.setProperty('--bg-blur', document.getElementById('bgBlur').value + 'px');
        }

        function updateDimensions() {
            const w = document.getElementById('inWidth').value || 380;
            const h = document.getElementById('inHeight').value || 675;
            const scale = document.getElementById('uiScale').value;
            const radius = document.getElementById('inRadius').value;
            const playerZoom = document.getElementById('inPlayerZoom').value;

            document.documentElement.style.setProperty('--pin-width', w + 'px');
            document.documentElement.style.setProperty('--pin-height', h + 'px');
            document.documentElement.style.setProperty('--pin-scale', scale);
            document.documentElement.style.setProperty('--border-radius', radius + 'px');
            document.documentElement.style.setProperty('--player-internal-zoom', playerZoom);
        }

        function updateUI() {
            const outT = document.getElementById('outTitle');
            const outA = document.getElementById('outArtist');
            const manualT = document.getElementById('manualFontT').value;
            const manualA = document.getElementById('manualFontA').value;
            
            outT.innerText = document.getElementById('inTitle').value;
            outT.style.fontSize = document.getElementById('tsTitle').value + 'px';
            outT.style.color = document.getElementById('cTitle').value;
            if(manualT) outT.style.fontFamily = manualT + ', sans-serif';
            
            outA.innerText = document.getElementById('inArtist').value;
            outA.style.fontSize = document.getElementById('tsArtist').value + 'px';
            outA.style.color = document.getElementById('cArtist').value;
            if(manualA) outA.style.fontFamily = manualA + ', sans-serif';

            document.documentElement.style.setProperty('--wave-scale', document.getElementById('waveScale').value);
            document.documentElement.style.setProperty('--color-waves', document.getElementById('cWaves').value);
            document.documentElement.style.setProperty('--color-player', document.getElementById('cPlayer').value);
            document.documentElement.style.setProperty('--glass-blur', document.getElementById('inBlurPx').value + 'px');
            document.getElementById('playBtn').style.color = document.getElementById('cPlayer').value;
        }

        // File handling
        function handleFile(e, type) {
            const file = e.target.files[0];
            if(!file) return;
            const url = URL.createObjectURL(file);
            if(type === 'audio') {
                audio.src = url;
                audio.onloadedmetadata = () => document.getElementById('durTime').innerText = formatTime(audio.duration);
            }
            if(type === 'pin') document.getElementById('pinFrame').style.backgroundImage = `url(${url})`;
            if(type === 'web') document.getElementById('webBackground').style.backgroundImage = `url(${url})`;
        }

        // Playback logic
        function togglePlay(e) {
            if(e && e.stopPropagation) e.stopPropagation();
            if(!audio.src) return;
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            if(audio.paused) {
                audio.play();
                document.getElementById('playIcon').innerHTML = '<path d="M5 4h3v12H5V4zm7 0h3v12h-3V4z"/>';
            } else {
                audio.pause();
                document.getElementById('playIcon').innerHTML = '<path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.333-5.89a1.5 1.5 0 000-2.538L6.3 2.841z"></path>';
            }
        }

        audio.ontimeupdate = () => {
            if(!audio.duration) return;
            const prog = (audio.currentTime/audio.duration)*100;
            document.getElementById('seekBar').value = prog || 0;
            document.getElementById('seekBar').style.backgroundSize = `${prog}% 100%`;
            document.getElementById('curTime').innerText = formatTime(audio.currentTime);
        };

        function seek(val) { if(audio.duration) audio.currentTime = (val/100)*audio.duration; }
        function formatTime(s) { const m=Math.floor(s/60), sc=Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`; }

        // Animation Loop
        function draw() {
            requestAnimationFrame(draw);
            if(analyser) analyser.getByteFrequencyData(dataArray);
            
            const w = canvas.width = canvas.clientWidth * 2;
            const h = canvas.height = canvas.clientHeight * 2;
            ctx.clearRect(0, 0, w, h);
            
            const waveColor = document.getElementById('cWaves').value;
            const waveScaleFactor = parseFloat(document.documentElement.style.getPropertyValue('--wave-scale') || 1);
            const time = Date.now() * 0.003;
            
            let bass = 0; 
            if(dataArray && !audio.paused) { 
                for(let i=0; i<5; i++) bass += dataArray[i]; 
                bass = (bass/5)/255; 
            }
            
            document.documentElement.style.setProperty('--player-scale', 1 + (bass * 0.15));

            const drawWave = (amp, freq, speed, op, thick) => {
                const scaledAmp = amp * waveScaleFactor;
                ctx.beginPath(); 
                ctx.lineWidth = thick; 
                ctx.strokeStyle = waveColor + op;
                for(let x=0; x<=w; x+=4) {
                    const y = (h/2) + Math.sin(x*freq + time*speed) * scaledAmp;
                    if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                }
                ctx.stroke();
            };

            drawWave(25+(bass*60), 0.004, 0.5, "33", 10);
            drawWave(15+(bass*80), 0.008, 1.2, "88", 6);
            drawWave(10+(bass*30), 0.015, 2.0, "FF", 3);
        }

        window.onload = draw;

        // Export PNG logic
        async function applyExportMargin(active) {
            document.documentElement.style.setProperty('--export-padding', active ? '8px' : '0px');
            await new Promise(r => setTimeout(r, 150)); 
        }

        async function downloadPinImage() {
            const pin = document.getElementById('pinFrame');
            const originalScale = document.documentElement.style.getPropertyValue('--pin-scale');
            
            document.documentElement.style.setProperty('--pin-scale', '1');
            await applyExportMargin(true);

            const canv = await html2canvas(pin, { 
                useCORS: true, 
                scale: 3,
                backgroundColor: null,
                width: parseInt(document.getElementById('inWidth').value),
                height: parseInt(document.getElementById('inHeight').value)
            });

            const link = document.createElement('a');
            link.download = `yv_studio_${Date.now()}.png`;
            link.href = canv.toDataURL('image/png');
            link.click();

            document.documentElement.style.setProperty('--pin-scale', originalScale);
            await applyExportMargin(false);
        }
    </script>
</body>
</html>
