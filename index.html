<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YV-STUDIO ULTIMATE v4 - FIXED</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}

#visualizer{
    width:400px;
    height:200px;
    background:black;
}

button{
    margin-top:20px;
    padding:10px 20px;
    background:white;
    color:black;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div>
    <canvas id="visualizer"></canvas><br>
    <input type="file" id="audioFile"><br>
    <button onclick="exportMp4()">EXPORTAR VIDEO</button>
</div>

<audio id="audioSource"></audio>

<script>
const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("audioSource");

let audioCtx, analyser, dataArray, dest;
let isExporting = false;

// cargar audio
document.getElementById("audioFile").onchange = e=>{
    const file = e.target.files[0];
    if(file){
        audio.src = URL.createObjectURL(file);
    }
};

// setup audio
function setupAudio(){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaElementSource(audio);

    dest = audioCtx.createMediaStreamDestination();

    source.connect(analyser);
    analyser.connect(dest);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
}

// visualizador
function draw(){
    requestAnimationFrame(draw);

    if(!analyser) return;

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const barWidth = (canvas.width / dataArray.length)*2;
    let x = 0;

    for(let i=0;i<dataArray.length;i++){
        const barHeight = dataArray[i];
        ctx.fillStyle = "lime";
        ctx.fillRect(x, canvas.height-barHeight, barWidth, barHeight);
        x += barWidth + 1;
    }
}
draw();

// 🚀 EXPORTAR VIDEO (FIXED)
async function exportMp4(){

    if(isExporting) return;

    if(!audio.src){
        alert("Carga un audio primero");
        return;
    }

    try{
        isExporting = true;

        // 🔥 FIX CRÍTICO: tamaño real del canvas
        canvas.width = canvas.clientWidth * 2;
        canvas.height = canvas.clientHeight * 2;

        if(!audioCtx) setupAudio();

        await audioCtx.resume();

        const canvasStream = canvas.captureStream(30);

        const combined = new MediaStream([
            ...canvasStream.getVideoTracks(),
            ...dest.stream.getAudioTracks()
        ]);

        let options = { mimeType: "video/webm;codecs=vp8" };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: "video/webm" };
        }

        const recorder = new MediaRecorder(combined, options);
        const chunks = [];

        recorder.ondataavailable = e=>{
            if(e.data.size > 0) chunks.push(e.data);
        };

        recorder.onerror = e=>{
            console.error("MediaRecorder error:", e);
            alert("Error al grabar video");
        };

        recorder.onstop = ()=>{
            const blob = new Blob(chunks,{type:"video/webm"});
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "YV_STUDIO_EXPORT.webm";
            a.click();

            isExporting = false;
        };

        audio.currentTime = 0;
        await audio.play();
        recorder.start();

        audio.onended = ()=>{
            recorder.stop();
            audio.pause();
        };

    }catch(err){
        console.error(err);
        alert("Error en exportación");
        isExporting = false;
    }
}
</script>

</body>
</html>
